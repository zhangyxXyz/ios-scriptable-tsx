            }

            class MockPoint {
                constructor(x = 0, y = 0) {
                    this.x = x
                    this.y = y
                }
            }

            class MockPath {
                constructor() {
                    this.commands = []
                }
                addRoundedRect(rect, cornerWidth = 0, cornerHeight = cornerWidth) {
                    this.commands.push(['roundedRect', rect, cornerWidth, cornerHeight])
                }
                addEllipse(rect) {
                    this.commands.push(['ellipse', rect])
                }
                move(point) {
                    this.commands.push(['move', point])
                }
                addLine(point) {
                    this.commands.push(['line', point])
                }
                closeSubpath() {
                    this.commands.push(['close'])
                }
            }

            class MockImage {
                constructor(label = 'image', kind = 'image', src = '', filePath = '', element = null) {
                    this.label = label
                    this.kind = kind
                    this.src = src
                    this.filePath = filePath
                    this.element = element
                    this.size = {width: 100, height: 100}
                }
                static async fromSrc(label, kind, src, filePath = '') {
                    const element = document.createElement('img')
                    element.crossOrigin = 'anonymous'
                    element.src = src
                    await new Promise(resolve => {
                        element.onload = resolve
                        element.onerror = resolve
                    })
                    const image = new MockImage(label, kind, src, filePath, element)
                    image.size = {
                        width: element.naturalWidth || element.width || 100,
                        height: element.naturalHeight || element.height || 100,
                    }
                    return image
                }
                static fromData(data) {
                    return new MockImage('data', 'data-image', data?.toDataUrl?.() || '')
                }
                static fromFile(file) {
                    const cached = state.fileCache.get(file)
                    if (cached instanceof MockImage) return cached
                    const result = apiJsonSync('GET', `/api/fs/read-data?path=${encodeURIComponent(file)}`)
                    const base64 = result.data?.base64 || ''
                    return new MockImage(file, 'file-image', base64ToDataUrl(base64, result.data?.contentType), file)
                }
            }

            class MockData {
                constructor(value = '', contentType = 'text/plain; charset=utf-8') {
                    this.value = value
                    this.contentType = contentType
                }
                static fromString(value) {
                    return new MockData(stringToBase64(value), 'text/plain; charset=utf-8')
                }
                static fromBase64String(value) {
                    return new MockData(value)
                }
                static fromPNG(image) {
                    return new MockData(dataUrlToBase64(image?.src), 'image/png')
                }
                static fromJPEG(image) {
                    return new MockData(dataUrlToBase64(image?.src), 'image/jpeg')
                }
                static fromFile(file) {
                    const result = apiJsonSync('GET', `/api/fs/read-data?path=${encodeURIComponent(file)}`)
                    return new MockData(result.data?.base64 || '', result.data?.contentType)
                }
                toRawString() {
                    return base64ToString(this.value)
                }
                toBase64String() {
                    return this.value
                }
                toDataUrl() {
                    return base64ToDataUrl(this.value, this.contentType)
                }
            }

            class WidgetNode {
                constructor(type, props = {}) {
                    this.type = type
                    this.props = props
                    this.children = []
                    this.spacing = 0
                }
                addText(text) {
                    const node = new WidgetNode('text', {text})
                    this.children.push(node)
                    return node
                }
                addStack() {
                    const node = new WidgetNode('stack')
                    this.children.push(node)
                    return node
                }
                addSpacer(length = null) {
                    const node = new WidgetNode('spacer', {length})
                    this.children.push(node)
                    return node
                }
                addImage(image) {
                    const node = new WidgetNode('image', {image})
                    this.children.push(node)
                    return node
                }
                addDate(date) {
                    const node = new WidgetNode('date', {date})
                    this.children.push(node)
                    return node
                }
                setPadding(top, left, bottom, right) {
                    this.props.padding = [top, left, bottom, right]
                }
                layoutHorizontally() {
                    this.props.direction = 'row'
                }
                layoutVertically() {
                    this.props.direction = 'column'
                }
                centerAlignContent() {
                    this.props.align = 'center'
                }
                topAlignContent() {
                    this.props.align = 'top'
                }
                bottomAlignContent() {
                    this.props.align = 'bottom'
                }
                centerAlignText() {
                    this.props.textAlign = 'center'
                }
                rightAlignText() {
                    this.props.textAlign = 'right'
                }
                leftAlignText() {
                    this.props.textAlign = 'left'
                }
                applyFillingContentMode() {
                    this.props.contentMode = 'fill'
                }
                applyFittingContentMode() {
                    this.props.contentMode = 'fit'
                }
                presentSmall() {
                    renderWidget(this, 'small')
                }
                presentMedium() {
                    renderWidget(this, 'medium')
                }
                presentLarge() {
                    renderWidget(this, 'large')
                }
                presentAccessoryInline() {
                    renderWidget(this, 'accessoryInline')
                }
                presentAccessoryRectangular() {
                    renderWidget(this, 'accessoryRectangular')
                }
                presentAccessoryCircular() {
                    renderWidget(this, 'accessoryCircular')
                }
            }

            class MockListWidget extends WidgetNode {
                constructor() {
                    super('widget')
                    this.props.direction = 'column'
                }
            }

            let rootAlignmentToken = 0

            function renderWidget(widget, family = $('family').value) {
                if (family && $('family').value !== family) $('family').value = family
                previewEl.classList.toggle('small', family === 'small')
                previewEl.classList.toggle('large', family === 'large')
                previewEl.classList.toggle('accessoryInline', family === 'accessoryInline')
                previewEl.classList.toggle('accessoryRectangular', family === 'accessoryRectangular')
                previewEl.classList.toggle('accessoryCircular', family === 'accessoryCircular')
                applyRootWidgetStyle(widget, family)
                const direction = readProp(widget, 'direction') || 'column'
                previewEl.innerHTML = (widget.children || []).map(child => renderNode(child, direction, family)).join('')
                updateRootWidgetAlignment(widget, family, direction)
            }

            function readProp(node, key) {
                return node?.[key] ?? node?.props?.[key]
            }

            function colorToCss(value) {
                if (!value) return ''
                if (typeof value === 'string') return value
                if (typeof value.toString === 'function') return value.toString()
                return ''
            }

            function isDarkPreview() {
                return $('appearance').value === 'dark'
            }

            function isAccessoryFamily(family) {
                return ['accessoryInline', 'accessoryRectangular', 'accessoryCircular'].includes(family)
            }

            function normalizeTextColor(color) {
                const cssColor = colorToCss(color)
                if (!isDarkPreview()) return cssColor
                if (!cssColor || cssColor === '#000000' || cssColor === 'rgb(0, 0, 0)' || cssColor === 'black') {
                    return '#ffffff'
                }
                return cssColor
            }

            function styleFromNode(node, parentDirection = 'column') {
                const styles = []
                const textColor = readProp(node, 'textColor')
                const opacity = readProp(node, 'textOpacity') ?? readProp(node, 'opacity')
                const font = readProp(node, 'font')
                const textAlign = readProp(node, 'textAlign')
                const lineLimit = readProp(node, 'lineLimit')
                const padding = readProp(node, 'padding')
                const backgroundColor = readProp(node, 'backgroundColor')
                const cornerRadius = readProp(node, 'cornerRadius')
                const size = readProp(node, 'size')
                styles.push(`color:${normalizeTextColor(textColor)}`)
                if (opacity !== undefined) styles.push(`opacity:${opacity}`)
                if (font?.size) styles.push(`font-size:${font.size}px`)
                if (font?.weight) styles.push(`font-weight:${font.weight}`)
                if (font?.name && /mono/i.test(font.name)) {
                    styles.push("font-family:'SF Mono','Menlo','Consolas',monospace")
                } else if (font?.name) {
                    styles.push("font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif")
                }
                const isTextNode = node?.type === 'text'
                if (textAlign) styles.push(`text-align:${textAlign}`)
                if (isTextNode && parentDirection !== 'row' && (textAlign || lineLimit)) {
                    styles.push('width:100%')
                    styles.push('box-sizing:border-box')
                    styles.push('align-self:stretch')
                }
                if (lineLimit === 1) styles.push('white-space:nowrap')
                if (lineLimit > 1) {
                    styles.push('white-space:normal')
                    styles.push('max-width:100%')
                    styles.push('min-width:0')
                    styles.push('overflow:hidden')
                    styles.push('overflow-wrap:anywhere')
                    styles.push('word-break:break-word')
                    styles.push('display:-webkit-box')
                    styles.push(`-webkit-line-clamp:${lineLimit}`)
                    styles.push('-webkit-box-orient:vertical')
                }
                if (padding) styles.push(`padding:${padding[0]}px ${padding[3]}px ${padding[2]}px ${padding[1]}px`)
                if (backgroundColor) styles.push(`background:${colorToCss(backgroundColor)}`)
                if (cornerRadius !== undefined) styles.push(`border-radius:${cornerRadius}px`)
                if (size?.width) styles.push(`width:${size.width}px`)
                if (size?.height) styles.push(`height:${size.height}px`)
                return styles.length ? ` style="${styles.join(';')}"` : ''
            }

            function applyRootWidgetStyle(widget, family = $('family').value) {
                const backgroundImage = readProp(widget, 'backgroundImage')
                const backgroundColor = colorToCss(readProp(widget, 'backgroundColor'))
                const borderColor = colorToCss(readProp(widget, 'borderColor'))
                previewEl.style.background =
                    backgroundColor || (isDarkPreview() ? '#000000' : '#fafafa')
                previewEl.style.backgroundImage = backgroundImage?.src ? `url("${backgroundImage.src}")` : ''
                previewEl.style.backgroundSize = backgroundImage?.src ? 'cover' : ''
                previewEl.style.backgroundPosition = backgroundImage?.src ? 'center' : ''
                previewEl.style.gap = `${Number(readProp(widget, 'spacing') || 0)}px`
                previewEl.style.display = 'flex'
                previewEl.style.flexDirection = readProp(widget, 'direction') === 'row' ? 'row' : 'column'
                previewEl.style.alignItems = isAccessoryFamily(family) ? 'center' : 'stretch'
                previewEl.style.justifyContent = isAccessoryFamily(family) ? 'center' : 'flex-start'
                previewEl.style.borderColor = borderColor || (isDarkPreview() ? '#263856' : '#e3e7ef')
                const padding = readProp(widget, 'padding')
                if (padding) {
                    previewEl.style.padding = `${padding[0]}px ${padding[3]}px ${padding[2]}px ${padding[1]}px`
                } else if (family === 'accessoryInline') {
                    previewEl.style.padding = '4px 10px'
                } else if (family === 'accessoryRectangular') {
                    previewEl.style.padding = '9px 12px'
                } else if (family === 'accessoryCircular') {
                    previewEl.style.padding = '8px'
                } else {
                    previewEl.style.padding = '10px 12px'
                }
            }

            function hasRootFlexibleSpacer(widget) {
                return (widget.children || []).some(
                    child =>
                        child?.type === 'spacer' &&
                        (readProp(child, 'length') === null || readProp(child, 'length') === undefined),
                )
            }

            function updateRootWidgetAlignment(widget, family, direction) {
                const token = ++rootAlignmentToken
                if (isAccessoryFamily(family)) return
                if (direction === 'row' || hasRootFlexibleSpacer(widget)) {
                    previewEl.style.justifyContent = 'flex-start'
                    return
                }

                requestAnimationFrame(() => {
                    if (token !== rootAlignmentToken) return
                    const children = Array.from(previewEl.children)
                    if (!children.length) return

                    const widgetRect = previewEl.getBoundingClientRect()
                    const visibleRects = children
                        .map(child => child.getBoundingClientRect())
                        .filter(rect => rect.width > 0 && rect.height > 0)
                    if (!visibleRects.length) return

                    const contentTop = Math.min(...visibleRects.map(rect => rect.top))
                    const contentBottom = Math.max(...visibleRects.map(rect => rect.bottom))
                    const contentHeight = contentBottom - contentTop
                    const availableHeight = widgetRect.height
                    const spareHeight = availableHeight - contentHeight
                    previewEl.style.justifyContent =
                        contentHeight > 0 && spareHeight > 28 && contentHeight / availableHeight < 0.78
                            ? 'center'
                            : 'flex-start'
                })
            }

            function renderImageNode(node) {
                const image = readProp(node, 'image')
                const imageSize = readProp(node, 'imageSize') || image?.size || {}
                const width = Number(imageSize.width || 18)
                const height = Number(imageSize.height || 18)
                const styles = [`width:${width}px`, `height:${height}px`]
                const opacity = readProp(node, 'imageOpacity') ?? readProp(node, 'opacity')
                const tintColor = readProp(node, 'tintColor')
                if (opacity !== undefined) styles.push(`opacity:${opacity}`)
                if (tintColor) styles.push(`color:${colorToCss(tintColor)}`)

                if (image?.kind === 'sf-symbol') {
                    const symbolSrc = image.src ? `url(${escapeHtml(image.src)})` : ''
                    if (symbolSrc) styles.push(`--symbol-src:${symbolSrc}`)
                    return `<span class="image sf-symbol" data-symbol-src="true" title="${escapeHtml(
                        image.label,
                    )}" style="${styles.join(';')}"></span>`
                }

                if (image?.src) {
                    if (tintColor) {
                        styles.push(`--image-src:url(${escapeHtml(image.src)})`)
                        return `<span class="image tinted-image" data-image-src="true" title="${escapeHtml(image.label || 'image')}" style="${styles.join(';')}"></span>`
                    }
                    return `<span class="image real-image" title="${escapeHtml(image.label || 'image')}" style="${styles.join(';')}"><img alt="" src="${escapeHtml(image.src)}"></span>`
                }

                return `<span class="image" title="${escapeHtml(image?.label || 'image')}" style="${styles.join(';')}">${escapeHtml(
                    image?.label || 'img',
                )}</span>`
            }

            function mergeInlineStyle(styleAttr, extraStyles) {
                const extra = extraStyles.filter(Boolean).join(';')
                if (!extra) return styleAttr
                if (!styleAttr) return ` style="${extra}"`
                return styleAttr.replace(/^ style="/, ` style="${extra};`)
            }

            function renderNode(node, parentDirection = 'column', family = $('family').value) {
                if (!node) return ''
                if (node.type === 'text') {
                    const lineLimit = readProp(node, 'lineLimit')
                    const textClass = `text${
                        lineLimit === 1 ? ' text--line-limit-1' : lineLimit > 1 ? ' text--line-limit-multi' : ''
                    }`
                    const textValue = readProp(node, 'text') || ''
                    return `<div class="${textClass}"${styleFromNode(node, parentDirection)}>${escapeHtml(textValue)}</div>`
                }
                if (node.type === 'image') return renderImageNode(node)
                if (node.type === 'date')
                    return `<div class="text">${escapeHtml(new Date(readProp(node, 'date')).toLocaleString())}</div>`
                if (node.type === 'spacer') {
                    const length = readProp(node, 'length')
                    if (length === null || length === undefined) return '<div style="flex:1 1 auto"></div>'
                    const prop = parentDirection === 'row' ? 'width' : 'height'
                    return `<div style="flex:0 0 auto;${prop}:${Number(length)}px"></div>`
                }
                const direction = readProp(node, 'direction') || 'row'
                const textChildren = (node.children || []).filter(child => child?.type === 'text').length
                const imageChildren = (node.children || []).filter(child => child?.type === 'image').length
                const hasFlexibleSpacer = (node.children || []).some(
                    child =>
                        child?.type === 'spacer' &&
                        (readProp(child, 'length') === null || readProp(child, 'length') === undefined),
                )
                const isStatusStack = direction === 'row' && imageChildren > 0 && textChildren > 0
                const className =
                    direction === 'row'
                        ? `stack${textChildren >= 2 && hasFlexibleSpacer ? ' row-stack' : ''}${isStatusStack ? ' status-stack' : ''}`
                        : 'stack column'
                const align = readProp(node, 'align')
                const gap = Number(readProp(node, 'spacing') || 0)
                const alignItems =
                    align === 'center' ? 'center' : align === 'bottom' ? 'flex-end' : isStatusStack ? 'center' : 'flex-start'
                const style = mergeInlineStyle(styleFromNode(node), [
                    gap ? `gap:${gap}px` : '',
                    direction === 'row' ? `align-items:${alignItems}` : '',
                ])
                const content = (node.children || [])
                    .map(child => renderNode(child, direction, family))
                    .join('')
                const href = readProp(node, 'href') || readProp(node, 'url')
                if (href) {
                    return `<a class="${className} stack-link" href="${escapeHtml(href)}" title="${escapeHtml(href)}"${style}>${content}</a>`
                }
                return `<div class="${className}"${style}>${content}</div>`
            }

            function makeFileManager(documentsRoot = '/documents', libraryRoot = '/library') {
                return {
                    documentsDirectory: () => documentsRoot,
                    libraryDirectory: () => libraryRoot,
                    temporaryDirectory: () => '/tmp',
                    joinPath: (base, file) => `${base}/${file}`.replace(/\/+/g, '/'),
                    fileExists: file =>
                        Boolean(apiJsonSync('GET', `/api/fs/exists?path=${encodeURIComponent(file)}`).data),
                    createDirectory: (file, recursive = true) =>
                        apiJsonSync('POST', '/api/fs/mkdir', {path: file, recursive}),
                    writeString: (file, value) =>
                        apiJsonSync('POST', '/api/fs/write-string', {path: file, value: String(value)}),
                    readString: file =>
                        String(apiJsonSync('GET', `/api/fs/read-string?path=${encodeURIComponent(file)}`).data || ''),
                    write: (file, value) => {
                        const data = value instanceof MockData ? value : MockData.fromString(String(value || ''))
                        state.fileCache.set(file, data)
                        apiJsonSync('POST', '/api/fs/write-data', {path: file, base64: data.toBase64String()})
                    },
                    writeImage: (file, value) => {
                        state.fileCache.set(file, value)
                        apiJsonSync('POST', '/api/fs/write-data', {
                            path: file,
                            base64: dataUrlToBase64(value?.src) || stringToBase64(value?.label || 'image'),
                        })
                    },
                    read: file => {
                        const cached = state.fileCache.get(file)
                        if (cached instanceof MockData) return cached
                        return MockData.fromFile(file)
                    },
                    remove: file => {
                        state.fileCache.delete(file)
                        apiJsonSync('POST', '/api/fs/remove', {path: file})
                    },
                    creationDate: file => {
                        const stat = apiJsonSync('GET', `/api/fs/stat?path=${encodeURIComponent(file)}`).data
                        return stat?.createdAt ? new Date(stat.createdAt) : new Date()
                    },
                    modificationDate: file => {
                        const stat = apiJsonSync('GET', `/api/fs/stat?path=${encodeURIComponent(file)}`).data
                        return stat?.modifiedAt ? new Date(stat.modifiedAt) : new Date()
                    },
                    listContents: file =>
                        apiJsonSync('GET', `/api/fs/list?path=${encodeURIComponent(file)}`).data || [],
                }
            }

            function findMockResponse(mockMap, url) {
                if (!mockMap || typeof mockMap !== 'object') return undefined
                if (Object.prototype.hasOwnProperty.call(mockMap, url)) return mockMap[url]
                const matchKey = Object.keys(mockMap).find(key => key && url.includes(key))
                return matchKey ? mockMap[matchKey] : undefined
            }

            async function proxyFetch(url, init = {}) {
                const response = await fetch('/api/proxy', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        url,
                        method: init.method || 'GET',
                        headers: init.headers || {},
                        body: init.body,
                    }),
                })
                if (!response.ok) throw new Error(`Request failed ${response.status}: ${url}`)
                return response
            }

            function createMockApiResponse(url, error) {
                const now = new Date()
                return {
                    code: 0,
                    msg: 'success',
                    data: {
                        id: 'playground-sample',
                        title: 'Playground mock response',
                        summary: 'This is a fallback response generated by the local Scriptable Playground.',
                        url,
                        status: 'ok',
                        updatedAt: now.toISOString(),
                        items: [
                            {
                                id: 'sample-1',
                                name: 'Sample item',
                                value: 86,
                                trend: 'stable',
                            },
                            {
                                id: 'sample-2',
                                name: 'Preview item',
                                value: 42,
                                trend: 'up',
                            },
                        ],
                    },
                    meta: {
                        mocked: true,
                        source: 'playground',
                        reason: error instanceof Error ? error.message : String(error || 'network unavailable'),
                        timestamp: now.getTime(),
                    },
                }
            }

            function createSandbox(mockMap, family, parameter, scriptName, appearance, runMode) {
                const fm = makeFileManager()
                const iCloudFm = makeFileManager('/icloud', '/icloud/Library')
                const isDarkAppearance = appearance === 'dark'
                let currentScriptName = scriptName
                const moduleExports = {}
                const moduleInfo = {
                    exports: moduleExports,
                    filename: `/documents/${scriptName}`,
                }
                function currentScriptBaseName() {
                    return currentScriptName.replace(/\.js$/, '')
                }
                function resolveKeychainKey(key) {
                    const readableKey = currentScriptBaseName()
                    const hashedSettingsKey = md5(readableKey)
                    if (key !== hashedSettingsKey) return key

                    const store = readKeychainStore()
                    if (
                        Object.prototype.hasOwnProperty.call(store, key) &&
                        Object.prototype.hasOwnProperty.call(store, readableKey)
                    ) {
                        writeLog(
                            'warn',
                            `[Keychain] conflict for ${readableKey}: both hashed key ${key} and readable key exist; using readable key`,
                        )
                    } else if (Object.prototype.hasOwnProperty.call(store, key)) {
                        store[readableKey] = store[key]
                        delete store[key]
                        writeKeychainStore()
                        writeLog('warn', `[Keychain] migrated ${key} to readable key ${readableKey}`)
                    }
                    return readableKey
                }
                const consoleProxy = {
                    log: (...args) => writeLog('log', args.length === 1 ? args[0] : args),
                    warn: (...args) => writeLog('warn', args.length === 1 ? args[0] : args),
                    error: (...args) => writeLog('error', args.length === 1 ? args[0] : args),
                }
                MockColor.dynamic = (light, dark) => (isDarkAppearance ? dark || light : light || dark)

                class Request {
                    constructor(url) {
                        this.url = url
                        this.headers = {}
                        this.method = 'GET'
                    }
                    async loadJSON() {
                        const mockResponse = findMockResponse(mockMap, this.url)
                        if (mockResponse !== undefined) return mockResponse
                        try {
                            return await proxyFetch(this.url, this).then(res => res.json())
                        } catch (error) {
                            writeLog('warn', `Request.loadJSON fallback: ${this.url}`)
                            return createMockApiResponse(this.url, error)
                        }
                    }
                    async loadString() {
                        const mockResponse = findMockResponse(mockMap, this.url)
                        if (mockResponse !== undefined)
                            return typeof mockResponse === 'string' ? mockResponse : JSON.stringify(mockResponse)
                        try {
                            return await proxyFetch(this.url, this).then(res => res.text())
                        } catch (error) {
                            writeLog('warn', `Request.loadString fallback: ${this.url}`)
                            return JSON.stringify(createMockApiResponse(this.url, error), null, 2)
                        }
                    }
                    async load() {
                        const mockResponse = findMockResponse(mockMap, this.url)
                        if (mockResponse !== undefined) {
                            return MockData.fromString(
                                typeof mockResponse === 'string' ? mockResponse : JSON.stringify(mockResponse),
                            )
                        }
                        if (String(this.url).startsWith('data:')) {
                            return new MockData(dataUrlToBase64(this.url), dataUrlContentType(this.url))
                        }
                        try {
                            const response = await proxyFetch(this.url, this)
                            const contentType = response.headers.get('content-type') || 'application/octet-stream'
                            const buffer = await response.arrayBuffer()
                            const bytes = new Uint8Array(buffer)
                            let binary = ''
                            bytes.forEach(byte => {
                                binary += String.fromCharCode(byte)
                            })
                            return new MockData(btoa(binary), contentType)
                        } catch (error) {
                            writeLog('warn', `Request.load fallback: ${this.url}`)
                            return MockData.fromString(JSON.stringify(createMockApiResponse(this.url, error), null, 2))
                        }
                    }
                    async loadImage() {
                        const data = await this.load()
                        return MockImage.fromSrc(this.url, 'remote-image', data.toDataUrl())
                    }
                }
                const hostMocks = window.createScriptableHostMocks({
                    MockImage,
                    MockSize,
                    writeLog,
                    renderWebView,
                    presentAlert,
                    isDarkAppearance,
                    scriptName,
                    parameter,
                    family,
                    appearance,
                    runMode,
                    queryParameters: runMode === 'app' ? {__arg: parameter || '', __size: family} : {},
                    makeFileManager,
                    pickImageFromBrowser,
                })
                const sandbox = {
                    console: consoleProxy,
                    __setScriptFile: (file, runtimeScriptName = file) => {
                        currentScriptName = runtimeScriptName
                        moduleInfo.filename = `/documents/${file}`
                    },
                    __setEnvExports: exports => {
                        sandbox.__envExports = exports
                    },
                    module: moduleInfo,
                    exports: moduleExports,
                    config: hostMocks.config,
                    args: hostMocks.args,
                    Script: {
                        name: () => currentScriptName.replace(/\.js$/, ''),
                        setWidget: widget => {
                            renderWidget(widget)
                            writeLog('ok', 'Script.setWidget called')

                    DateFormatter: hostMocks.DateFormatter,

                        iCloud: () => iCloudFm,

                        set: (key, value) => {
                            readKeychainStore()[resolveKeychainKey(key)] = parseKeychainValue(String(value))
                            writeKeychainStore()

                        get: key => serializeKeychainValue(readKeychainStore()[resolveKeychainKey(key)]),
                        contains: key =>
                            Object.prototype.hasOwnProperty.call(readKeychainStore(), resolveKeychainKey(key)),
                        remove: key => {
                            delete readKeychainStore()[resolveKeychainKey(key)]
                            writeKeychainStore()
                        },

                    Request,

                    ListWidget: MockListWidget,

                    Font: MockFont,
                    Size: MockSize,
                    Rect: MockRect,
                    Point: MockPoint,
                    Path: MockPath,
                    Image: MockImage,
                    Data: MockData,
                    DrawContext: class {
                        constructor() {
                            this.canvas = document.createElement('canvas')
                            this.ctx = this.canvas.getContext('2d')
                            this._size = new MockSize(100, 100)
                            this.canvas.width = this._size.width
                            this.canvas.height = this._size.height
                            this.opaque = false
                            this.respectScreenScale = true
                            this.fillColor = '#000000'
                            this.strokeColor = '#000000'
                            this.currentPath = null
                        }
                        set size(value) {
                            this._size = value || new MockSize(100, 100)
                            this.canvas.width = Math.max(1, Number(this._size.width || 100))
                            this.canvas.height = Math.max(1, Number(this._size.height || 100))
                        }
                        get size() {
                            return this._size
                        }
                        applyPath(path) {
                            this.ctx.beginPath()
                            for (const command of path?.commands || []) {
                                const [type, ...args] = command
                                if (type === 'roundedRect') {
                                    const [rect, cornerWidth = 0] = args
                                    const x = Number(rect.x || 0)
                                    const y = Number(rect.y || 0)
                                    const w = Number(rect.width || 0)
                                    const h = Number(rect.height || 0)
                                    const r = Math.min(Number(cornerWidth || 0), w / 2, h / 2)
                                    this.ctx.moveTo(x + r, y)
                                    this.ctx.lineTo(x + w - r, y)
                                    this.ctx.quadraticCurveTo(x + w, y, x + w, y + r)
                                    this.ctx.lineTo(x + w, y + h - r)
                                    this.ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h)
                                    this.ctx.lineTo(x + r, y + h)
                                    this.ctx.quadraticCurveTo(x, y + h, x, y + h - r)
                                    this.ctx.lineTo(x, y + r)
                                    this.ctx.quadraticCurveTo(x, y, x + r, y)
                                }
                                if (type === 'ellipse') {
                                    const [rect] = args
                                    this.ctx.ellipse(
                                        Number(rect.x || 0) + Number(rect.width || 0) / 2,
                                        Number(rect.y || 0) + Number(rect.height || 0) / 2,
                                        Math.max(1, Number(rect.width || 0) / 2),
                                        Math.max(1, Number(rect.height || 0) / 2),
                                        0,
                                        0,
                                        Math.PI * 2,
                                    )
                                }
                                if (type === 'move') this.ctx.moveTo(Number(args[0].x || 0), Number(args[0].y || 0))
                                if (type === 'line') this.ctx.lineTo(Number(args[0].x || 0), Number(args[0].y || 0))
                                if (type === 'close') this.ctx.closePath()
                            }
                        }
                        drawImageInRect(image, rect) {
                            if (image?.element?.complete && image.element.naturalWidth > 0) {
                                this.ctx.drawImage(
                                    image.element,
                                    Number(rect.x || 0),
                                    Number(rect.y || 0),
                                    Number(rect.width || image.size?.width || 0),
                                    Number(rect.height || image.size?.height || 0),
                                )
                            }
                        }
                        drawImageAtPoint(image, point) {
                            if (image?.element?.complete && image.element.naturalWidth > 0) {
                                this.ctx.drawImage(image.element, Number(point.x || 0), Number(point.y || 0))
                            }
                        }
                        setFillColor(color) {
                            this.fillColor = colorToCss(color) || '#000000'
                            this.ctx.fillStyle = this.fillColor
                        }
                        setStrokeColor(color) {
                            this.strokeColor = colorToCss(color) || '#000000'
                            this.ctx.strokeStyle = this.strokeColor
                        }
                        setLineWidth(width) {
                            this.ctx.lineWidth = Number(width || 1)
                        }
                        addPath(path) {
                            this.currentPath = path
                        }
                        fillPath() {
                            this.applyPath(this.currentPath)
                            this.ctx.fillStyle = this.fillColor
                            this.ctx.fill()
                        }
                        strokePath() {
                            this.applyPath(this.currentPath)
                            this.ctx.strokeStyle = this.strokeColor
                            this.ctx.stroke()
                        }
                        fillRect(rect) {
                            this.ctx.fillStyle = this.fillColor
                            this.ctx.fillRect(
                                Number(rect.x || 0),
                                Number(rect.y || 0),
                                Number(rect.width || 0),
                                Number(rect.height || 0),
                            )
                        }
                        getImage() {
                            return new MockImage('draw-context', 'draw-context', this.canvas.toDataURL('image/png'))
                        }
                    },
                    LinearGradient: class {
                        constructor() {
                            this.colors = []
                            this.locations = []
                        }
                    },
                    SFSymbol: {
                        named: name => {
                            const image = new MockImage(name, 'sf-symbol', createSfSymbolPngDataUrl(name))
                            image.size = {width: 18, height: 18}
                            return {
                                image,
                                applyFont: () => {},
                            }
                        },
                    },
                    importModule: name => sandbox.require(name),
                    require: name => {
                        if (name === 'Seiun.Env.js' || name === './Seiun.Env' || name === './Seiun.Env.js')
                            return sandbox.__envExports || state.envExports
                        throw new Error(`Unsupported require: ${name}`)
                    },
                    setTimeout,
                    clearTimeout,
                    Promise,
                    Date,
                    Math,
                    JSON,
                    Array,
                    Object,
                    String,
                    Number,
                    Boolean,
                    RegExp,
                    Error,
                    URL,
                    encodeURIComponent,
                    decodeURIComponent,
                    escape,
                    unescape,
                    btoa,
                    atob,
                }
                sandbox.globalThis = sandbox
                return sandbox
            }

            async function executeScript(file, sandbox, runtimeScriptName = file) {
                sandbox.__setScriptFile?.(file, runtimeScriptName)
                const code = await fetch(`/api/script?file=${encodeURIComponent(file)}&t=${Date.now()}`).then(res =>
                    res.text(),
                )
                const runner = new AsyncFunction('sandbox', `with (sandbox) { ${code}\n }`)
                return runner(sandbox)
            }

            async function loadScripts() {
                const result = await fetch('/api/scripts').then(res => res.json())
                const scripts = (result.data || []).filter(name => name !== 'Seiun.Env.js')
                warnDuplicateScriptNames(scripts)
                $('script').innerHTML = scripts
                    .map(name => `<option value="${escapeHtml(name)}">${escapeHtml(displayScriptName(name))}</option>`)
                    .join('')
                setScriptPill()
                syncCustomSelect($('script'))
            }

            function docsPathFor(slug) {
                return slug ? `/scriptable-docs/${encodeURIComponent(slug)}/` : '/scriptable-docs/'
            }

            function setDocsPreview(slug) {
                const path = docsPathFor(slug)
                docsFrameEl.src = path
                docsOpenEl.href = path
            }

            function syncDocsTheme() {
                const theme = document.documentElement.dataset.theme === 'dark' ? 'dark' : 'light'
                docsFrameEl.style.background = theme === 'dark' ? '#0b1020' : '#ffffff'
                let doc
                try {
                    doc = docsFrameEl.contentDocument || docsFrameEl.contentWindow?.document
                } catch {
                    return
                }
                if (!doc?.head || !doc.body) return
                doc.documentElement.dataset.playgroundTheme = theme
                doc.body.dataset.mdColorScheme = theme === 'dark' ? 'slate' : 'default'
                let style = doc.getElementById('playground-docs-theme')
                if (!style) {
                    style = doc.createElement('style')
                    style.id = 'playground-docs-theme'
                    doc.head.appendChild(style)
                }
                style.textContent =
                    theme === 'dark'
                        ? `
                            :root {
                                color-scheme: dark;
                                --md-default-bg-color: #0b1020;
                                --md-default-fg-color: #e5eaf3;
                                --md-default-fg-color--light: #b8c3d6;
                                --md-accent-fg-color: #60a5fa;
                                --md-primary-fg-color: #050914;
                                --md-code-bg-color: #111827;
                                --md-code-fg-color: #dbe7f7;
                            }
                            html, body, .md-container, .md-main, .md-main__inner, .md-content, .md-content__inner, .md-sidebar, .md-nav {
                                background: #0b1020 !important;
                                color: #e5eaf3 !important;
                            }
                            .md-header, .md-tabs {
                                background: #050914 !important;
                                color: #f8fafc !important;
                            }
                            .md-header {
                                box-shadow: 0 12px 30px rgba(0, 0, 0, 0.32) !important;
                            }
                            .md-typeset, .md-typeset h1, .md-typeset h2, .md-typeset h3, .md-typeset h4 {
                                color: #e5eaf3 !important;
                            }
                            .md-typeset a, .md-nav__link--active, .md-nav__link:focus, .md-nav__link:hover {
                                color: #93c5fd !important;
                            }
                            .md-typeset code, .md-typeset pre, .highlight, .highlight pre {
                                background: #111827 !important;
                                color: #dbe7f7 !important;
                            }
                            .md-typeset hr, .md-typeset table:not([class]) td, .md-typeset table:not([class]) th {
                                border-color: rgba(148, 163, 184, 0.24) !important;
                            }
                            .md-search__form, .md-search__input {
                                background: #111827 !important;
                                color: #e5eaf3 !important;
                            }
                        `
                        : `
                            :root {
                                color-scheme: light;
                                --md-default-bg-color: #ffffff;
                                --md-default-fg-color: #1f2937;
                                --md-default-fg-color--light: #5f6f86;
                                --md-accent-fg-color: #2563eb;
                                --md-primary-fg-color: #000000;
                                --md-code-bg-color: #f3f4f6;
                                --md-code-fg-color: #1f2937;
                            }
                            html, body, .md-container, .md-main, .md-main__inner, .md-content, .md-content__inner {
                                background: #ffffff !important;
                                color: #1f2937 !important;
                            }
                            .md-header, .md-tabs {
                                background: #000000 !important;
                                color: #ffffff !important;
                            }
                            .md-typeset, .md-typeset h1, .md-typeset h2, .md-typeset h3, .md-typeset h4 {
                                color: #1f2937 !important;
                            }
                            .md-typeset a, .md-nav__link--active, .md-nav__link:focus, .md-nav__link:hover {
                                color: #2563eb !important;
                            }
                            .md-typeset code, .md-typeset pre, .highlight, .highlight pre {
                                background: #f3f4f6 !important;
                                color: #1f2937 !important;
                            }
                        `
            }

            async function loadScriptableDocs() {
                try {
                    const result = await fetch('/api/scriptable-docs').then(res => res.json())
                    const docs = result.data || []
                    const preferred = ['listwidget', 'webview', 'request', 'filemanager', 'keychain', 'photos']
                    const ordered = [
                        '',
                        ...preferred.filter(item => docs.includes(item)),
                        ...docs.filter(item => !preferred.includes(item)),
                    ]
                    docsSelectEl.innerHTML = ordered
                        .map(slug => {
                            const label = slug ? slug.replace(/(^|-)([a-z])/g, (_, dash, ch) => `${dash ? ' ' : ''}${ch.toUpperCase()}`) : 'Frontpage'
                            return `<option value="${escapeHtml(slug)}">${escapeHtml(label)}</option>`
                        })
                        .join('')
                    const initial = docs.includes('listwidget') ? 'listwidget' : ''
                    docsSelectEl.value = initial
                    syncCustomSelect(docsSelectEl)
                    setDocsPreview(initial)
                } catch (error) {
                    docsSelectEl.innerHTML = '<option value="">Docs unavailable</option>'
                    syncCustomSelect(docsSelectEl)
                    setDocsPreview('')
                    writeLog('warn', `[Docs] failed to load Scriptable docs: ${error.message}`)
                }
            }

            async function runSelected() {
                state.logs = []
                logEl.textContent = ''
                const script = $('script').value
                const family = $('family').value
                const parameter = $('parameter').value
                const appearance = $('appearance').value
                const runMode = $('runMode').value
                state.hasRun = true
                setStatus(`running ${script}`)
                try {
                    resetSurfaces(runMode)
                    const mockMap = safeJson($('mock').value)
                    const scriptSandbox = createSandbox(mockMap, family, parameter, script, appearance, runMode)
                    await executeScript('Seiun.Env.js', scriptSandbox, script)
                    state.envExports = scriptSandbox.module.exports
                    scriptSandbox.__setEnvExports(state.envExports)
                    if (runMode === 'app') {
                        executeScript(script, scriptSandbox)
                            .then(() => setStatus(`done ${script}`))
                            .catch(error => {
                                writeLog('error', error.stack || error.message || error)
                                setStatus('error')
                            })
                        setStatus(`app runtime active ${script}`)
                    } else {
                        await executeScript(script, scriptSandbox)
                        setStatus(`done ${script}`)
                    }
                } catch (error) {
                    writeLog('error', error.stack || error.message || error)
                    setStatus('error')
                }
            }

            $('run').addEventListener('click', runSelected)
            $('webviewBack').addEventListener('click', goBackWebView)
            $('runMode').addEventListener('change', event => syncRunModeSurface(event.target.value))
            $('appearance').addEventListener('change', handleAppearanceChange)
            $('themeToggle').addEventListener('click', cycleOuterTheme)
            $('scriptPill').addEventListener('click', () => openCustomSelectMenu($('script')))
            $('script').addEventListener('change', () => setScriptPill())
            $('showLog').addEventListener('click', () => setInspectorView('log'))
            $('showDocs').addEventListener('click', () => setInspectorView('docs'))
            $('docsSelect').addEventListener('change', event => setDocsPreview(event.target.value))
            docsFrameEl.addEventListener('load', syncDocsTheme)
            document.addEventListener('click', event => {
                if (!openCustomSelect) return
                if (openCustomSelect.wrapper.contains(event.target) || openCustomSelect.menu.contains(event.target)) return
                closeCustomSelect()
            })
            window.addEventListener('resize', closeCustomSelect)
            window.addEventListener('scroll', closeCustomSelect, true)
            window.matchMedia?.('(prefers-color-scheme: dark)').addEventListener?.('change', () => {
                if (state.outerThemePreference === 'auto') setOuterTheme('auto', false)
            })
            $('reload').addEventListener('click', async () => {
                await loadScripts()
                setStatus('scripts reloaded')
            })

            $('mock').value = '{}'
            setOuterTheme(getInitialOuterTheme(), false)
            syncRunModeSurface()
            initializeAppearance()
            applyPreviewDefaults()
            enhanceSelects()
            readKeychainStore()
            loadScriptableDocs()
            loadScripts().then(() => setStatus('ready'))
        </script>
