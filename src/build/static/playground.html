<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Scriptable Playground</title>
        <link rel="icon" type="image/png" href="/playground-assets/scriptable-appicon.png" />
        <link rel="apple-touch-icon" href="/playground-assets/scriptable-appicon.png" />
        <style>
            :root {
                color-scheme: light;
                --bg: #f5f7fb;
                --bg-soft: #eef3fb;
                --panel: rgba(255, 255, 255, 0.82);
                --panel-solid: #ffffff;
                --panel-subtle: rgba(248, 250, 252, 0.9);
                --text: #152033;
                --muted: #64748b;
                --line: rgba(120, 138, 163, 0.24);
                --line-strong: rgba(94, 112, 138, 0.38);
                --accent: #2563eb;
                --accent-strong: #1d4ed8;
                --accent-soft: rgba(37, 99, 235, 0.11);
                --danger: #dc2626;
                --ok: #16a34a;
                --shadow: 0 18px 45px rgba(34, 50, 84, 0.12);
                --shadow-soft: 0 10px 28px rgba(34, 50, 84, 0.09);
                --control-bg: rgba(255, 255, 255, 0.86);
                --control-hover: #f8fbff;
                --log-bg: #f8fafc;
                --log-text: #243247;
                --syntax-attr: #0550ae;
                --syntax-string: #0a7f52;
                --syntax-number: #953800;
                --syntax-keyword: #8250df;
                --syntax-comment: #6e7781;
                --syntax-title: #116329;
                --syntax-section: #0969da;
                --scroll-thumb: rgba(86, 104, 130, 0.42);
                --scroll-track: rgba(120, 138, 163, 0.12);
            }
            :root[data-theme='dark'] {
                color-scheme: dark;
                --bg: #070b13;
                --bg-soft: #0d1422;
                --panel: rgba(17, 24, 39, 0.72);
                --panel-solid: #111827;
                --panel-subtle: rgba(15, 23, 42, 0.78);
                --text: #e5eaf3;
                --muted: #95a3b8;
                --line: rgba(148, 163, 184, 0.18);
                --line-strong: rgba(148, 163, 184, 0.28);
                --accent: #60a5fa;
                --accent-strong: #93c5fd;
                --accent-soft: rgba(96, 165, 250, 0.13);
                --danger: #fb7185;
                --ok: #86efac;
                --shadow: 0 18px 50px rgba(0, 0, 0, 0.28);
                --shadow-soft: 0 10px 28px rgba(0, 0, 0, 0.24);
                --control-bg: rgba(15, 23, 42, 0.78);
                --control-hover: rgba(30, 41, 59, 0.9);
                --log-bg: #080d18;
                --log-text: #dbe7f7;
                --syntax-attr: #79c0ff;
                --syntax-string: #a5d6ff;
                --syntax-number: #ffa657;
                --syntax-keyword: #d2a8ff;
                --syntax-comment: #8b949e;
                --syntax-title: #7ee787;
                --syntax-section: #58a6ff;
                --scroll-thumb: rgba(148, 163, 184, 0.38);
                --scroll-track: rgba(148, 163, 184, 0.08);
            }
            * {
                box-sizing: border-box;
            }
            html {
                height: 100%;
                overflow: hidden;
                background: var(--bg);
            }
            body {
                margin: 0;
                height: 100%;
                min-height: 100vh;
                overflow: hidden;
                background:
                    radial-gradient(circle at 14% -8%, rgba(96, 165, 250, 0.18), transparent 28rem),
                    radial-gradient(circle at 88% 10%, rgba(20, 184, 166, 0.14), transparent 26rem),
                    linear-gradient(180deg, var(--bg), var(--bg-soft));
                color: var(--text);
                font:
                    14px/1.45 system-ui,
                    -apple-system,
                    BlinkMacSystemFont,
                    'Segoe UI',
                    sans-serif;
            }
            * {
                scrollbar-width: thin;
                scrollbar-color: var(--scroll-thumb) var(--scroll-track);
            }
            ::selection {
                background: var(--accent-soft);
            }
            ::-webkit-scrollbar {
                width: 10px;
                height: 10px;
            }
            ::-webkit-scrollbar-track {
                background: var(--scroll-track);
            }
            ::-webkit-scrollbar-thumb {
                background: var(--scroll-thumb);
                border: 2px solid transparent;
                border-radius: 999px;
                background-clip: padding-box;
            }
            ::-webkit-scrollbar-thumb:hover {
                background: var(--line-strong);
                background-clip: padding-box;
            }
            header {
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 16px;
                min-height: 68px;
                padding: 14px 20px;
                border-bottom: 1px solid var(--line);
                background: color-mix(in srgb, var(--panel) 92%, transparent);
                backdrop-filter: blur(18px);
                position: sticky;
                top: 0;
                z-index: 10;
            }
            h1 {
                margin: 0;
                font-size: 19px;
                font-weight: 720;
                letter-spacing: 0;
            }
            a {
                color: inherit;
            }
            .brand {
                display: flex;
                align-items: center;
                gap: 12px;
                min-width: 0;
            }
            .brand-mark {
                display: grid;
                place-items: center;
                width: 34px;
                height: 34px;
                border: 1px solid var(--line);
                border-radius: 8px;
                background: linear-gradient(135deg, var(--accent), #14b8a6);
                color: #ffffff;
                font-weight: 800;
                box-shadow: var(--shadow-soft);
                overflow: hidden;
            }
            .brand-mark img {
                display: block;
                width: 100%;
                height: 100%;
                object-fit: cover;
            }
            .brand-copy {
                min-width: 0;
            }
            .repo-link {
                display: inline-flex;
                align-items: center;
                gap: 5px;
                margin-top: 2px;
                color: var(--muted);
                font-size: 12px;
                text-decoration: none;
            }
            .repo-link svg {
                width: 13px;
                height: 13px;
                flex: 0 0 auto;
            }
            .repo-link:hover {
                color: var(--accent-strong);
            }
            .header-actions {
                display: flex;
                align-items: center;
                justify-content: flex-end;
                gap: 10px;
                min-width: 0;
            }
            main {
                display: grid;
                grid-template-columns: minmax(320px, 420px) minmax(0, 1fr);
                height: calc(100vh - 68px);
                min-height: 0;
            }
            aside {
                padding: 18px;
                border-right: 1px solid var(--line);
                background: var(--panel);
                backdrop-filter: blur(16px);
                overflow: auto;
            }
            section {
                min-width: 0;
                padding: 18px;
                overflow: auto;
            }
            label {
                display: block;
                margin: 0 0 6px;
                color: var(--muted);
                font-size: 12px;
                font-weight: 650;
            }
            select,
            input,
            textarea,
            button {
                width: 100%;
                font: inherit;
            }
            select,
            input,
            textarea {
                border: 1px solid var(--line);
                border-radius: 8px;
                background: var(--control-bg);
                color: var(--text);
                padding: 9px 11px;
                outline: none;
                transition:
                    border-color 0.16s ease,
                    background 0.16s ease,
                    box-shadow 0.16s ease;
            }
            select:hover,
            input:hover,
            textarea:hover {
                background: var(--control-hover);
            }
            select:focus,
            input:focus,
            textarea:focus {
                border-color: var(--accent);
                box-shadow: 0 0 0 3px var(--accent-soft);
            }
            textarea {
                min-height: 220px;
                resize: vertical;
                font-family: ui-monospace, SFMono-Regular, Consolas, 'Liberation Mono', monospace;
                font-size: 12px;
            }
            button {
                border: 1px solid color-mix(in srgb, var(--accent) 58%, transparent);
                border-radius: 8px;
                padding: 9px 12px;
                background: linear-gradient(180deg, var(--accent), color-mix(in srgb, var(--accent) 78%, #000));
                color: #ffffff;
                font-weight: 650;
                cursor: pointer;
                box-shadow: 0 10px 24px color-mix(in srgb, var(--accent) 22%, transparent);
                transition:
                    transform 0.16s ease,
                    box-shadow 0.16s ease,
                    background 0.16s ease;
            }
            button:hover {
                transform: translateY(-1px);
                box-shadow: 0 14px 30px color-mix(in srgb, var(--accent) 28%, transparent);
            }
            button:active {
                transform: translateY(0);
            }
            button.secondary {
                border-color: var(--line);
                background: var(--panel-subtle);
                color: var(--text);
                box-shadow: none;
            }
            .row {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 10px;
            }
            .field {
                margin-bottom: 13px;
            }
            .actions {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 10px;
                margin-top: 12px;
            }
            .shell-pill {
                display: inline-flex;
                align-items: center;
                min-height: 32px;
                border: 1px solid var(--line);
                border-radius: 999px;
                background: var(--panel-subtle);
            }
            .status {
                display: inline-flex;
                align-items: center;
                min-width: 0;
                max-width: 150px;
                padding: 6px 11px;
                color: var(--muted);
                font-size: 12px;
                font-weight: 650;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }
            .status::before {
                content: '';
                flex: 0 0 auto;
                width: 7px;
                height: 7px;
                margin-right: 8px;
                border-radius: 50%;
                background: var(--ok);
                box-shadow: 0 0 0 4px color-mix(in srgb, var(--ok) 14%, transparent);
            }
            .status[data-tone='busy']::before {
                background: var(--accent);
                box-shadow: 0 0 0 4px var(--accent-soft);
            }
            .status[data-tone='error']::before {
                background: var(--danger);
                box-shadow: 0 0 0 4px color-mix(in srgb, var(--danger) 16%, transparent);
            }
            .script-pill {
                width: auto;
                min-width: 0;
                max-width: 220px;
                padding: 6px 11px;
                background: var(--panel-subtle);
                color: var(--muted);
                box-shadow: none;
                border-color: var(--line);
                font-size: 12px;
                font-weight: 650;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }
            .script-pill:hover {
                transform: none;
                border-color: var(--line-strong);
                color: var(--accent-strong);
                box-shadow: none;
            }
            .theme-toggle {
                display: inline-grid;
                place-items: center;
                width: 36px;
                min-width: 36px;
                min-height: 36px;
                padding: 0;
                color: var(--accent-strong);
                box-shadow: none;
                border-color: transparent;
                border-radius: 50%;
                background: transparent;
                transition:
                    color 0.18s ease,
                    box-shadow 0.18s ease,
                    background 0.18s ease;
            }
            .theme-toggle:hover {
                transform: none;
                color: var(--accent-strong);
                background: transparent;
                box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
            }
            .theme-icon {
                display: none;
                width: 24px;
                height: 24px;
            }
            .theme-toggle[data-theme-value='auto'] .theme-icon-auto,
            .theme-toggle[data-theme-value='light'] .theme-icon-light,
            .theme-toggle[data-theme-value='dark'] .theme-icon-dark {
                display: block;
            }
            .workspace {
                display: grid;
                grid-template-columns: minmax(0, 390px) minmax(0, 390px) minmax(420px, 1fr);
                gap: 16px;
                align-items: start;
            }
            main[data-run-mode='widget'] .workspace {
                grid-template-columns: minmax(0, 390px) minmax(420px, 1fr);
            }
            main[data-run-mode='widget'] .webview {
                display: none;
            }
            .phone {
                width: 100%;
                max-width: 390px;
                border: 1px solid var(--line);
                border-radius: 8px;
                background: var(--panel);
                overflow: hidden;
                box-shadow: var(--shadow);
            }
            .webview {
                width: 100%;
                max-width: 390px;
                border: 1px solid var(--line);
                border-radius: 8px;
                background: var(--panel);
                overflow: hidden;
                box-shadow: var(--shadow);
            }
            .inspector-panel {
                min-width: 0;
                width: 100%;
                border: 1px solid var(--line);
                border-radius: 8px;
                background: var(--panel);
                overflow: hidden;
                box-shadow: var(--shadow);
            }
            .inspector-title {
                min-width: 0;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }
            .inspector-switch {
                display: inline-flex;
                flex: 0 0 auto;
                gap: 4px;
                padding: 3px;
                border: 1px solid var(--line);
                border-radius: 999px;
                background: var(--panel-subtle);
            }
            .inspector-switch button {
                width: auto;
                min-height: 24px;
                padding: 0 9px;
                border: 0;
                border-radius: 999px;
                background: transparent;
                color: var(--muted);
                box-shadow: none;
                font-size: 12px;
                line-height: 1;
            }
            .inspector-switch button:hover {
                transform: none;
                box-shadow: none;
                color: var(--text);
            }
            .inspector-switch button.active {
                background: var(--accent-soft);
                color: var(--accent-strong);
            }
            .inspector-view[hidden] {
                display: none;
            }
            .panel-toolbar {
                display: grid;
                grid-template-columns: minmax(0, 1fr) auto;
                gap: 8px;
                padding: 10px;
                border-bottom: 1px solid var(--line);
                background: var(--panel-subtle);
            }
            .panel-toolbar select {
                min-width: 0;
            }
            select.native-select-hidden {
                position: absolute;
                width: 1px;
                height: 1px;
                opacity: 0;
                pointer-events: none;
            }
            .custom-select {
                position: relative;
                width: 100%;
                min-width: 0;
            }
            .custom-select-button {
                display: grid;
                grid-template-columns: minmax(0, 1fr) auto;
                align-items: center;
                gap: 10px;
                width: 100%;
                min-height: 40px;
                padding: 9px 11px;
                border: 1px solid var(--line);
                border-radius: 12px;
                background: var(--control-bg);
                color: var(--text);
                text-align: left;
                box-shadow: none;
                backdrop-filter: blur(14px) saturate(130%);
            }
            .custom-select-button:hover {
                transform: none;
                border-color: var(--line-strong);
                background: var(--control-hover);
                box-shadow: none;
            }
            .custom-select-button:focus-visible {
                border-color: var(--accent);
                outline: none;
                box-shadow: 0 0 0 3px var(--accent-soft);
            }
            .custom-select-label {
                min-width: 0;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }
            .custom-select-chev {
                width: 16px;
                height: 16px;
                color: var(--muted);
                transition: transform 0.16s ease;
            }
            .custom-select.open .custom-select-chev {
                transform: rotate(180deg);
            }
            .custom-select-menu {
                position: fixed;
                z-index: 1000;
                max-height: 260px;
                overflow: auto;
                padding: 6px;
                border: 1px solid var(--line);
                border-radius: 12px;
                color: var(--text);
                box-shadow: var(--shadow);
                backdrop-filter: blur(18px) saturate(135%);
                background-clip: padding-box;
            }
            :root[data-theme='light'] .custom-select-menu {
                background: rgba(255, 255, 255, 0.92);
            }
            :root[data-theme='dark'] .custom-select-menu {
                background: rgba(17, 24, 39, 0.94);
            }
            .custom-select-option {
                position: relative;
                display: flex;
                align-items: center;
                gap: 8px;
                min-height: 34px;
                margin: 2px 0;
                padding: 7px 10px 7px 24px;
                border-radius: 9px;
                cursor: pointer;
                white-space: nowrap;
            }
            .custom-select-option:hover {
                background: color-mix(in srgb, var(--accent-soft) 58%, transparent);
                color: var(--text);
            }
            .custom-select-option[aria-selected='true'] {
                background: color-mix(in srgb, var(--accent-soft) 78%, transparent);
                color: var(--accent-strong);
                font-weight: 650;
            }
            .custom-select-option[aria-selected='true']::before {
                content: '';
                position: absolute;
                left: 10px;
                width: 6px;
                height: 6px;
                border-radius: 50%;
                background: currentColor;
                box-shadow: 0 0 0 4px color-mix(in srgb, currentColor 12%, transparent);
            }
            .panel-link {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                min-height: 34px;
                padding: 0 11px;
                border: 1px solid var(--line);
                border-radius: 8px;
                background: var(--control-bg);
                color: var(--text);
                font-size: 12px;
                font-weight: 650;
                text-decoration: none;
            }
            .panel-link:hover {
                color: var(--accent-strong);
                border-color: var(--line-strong);
            }
            .phone-title {
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 10px;
                min-height: 42px;
                padding: 10px 12px;
                border-bottom: 1px solid var(--line);
                color: var(--muted);
                font-size: 12px;
                font-weight: 650;
                background: var(--panel-subtle);
            }
            .webview {
                position: relative;
                overflow: hidden;
            }
            .icon-button {
                width: auto;
                border: 1px solid var(--line);
                border-radius: 999px;
                padding: 4px 8px;
                background: var(--control-bg);
                color: var(--text);
                font-size: 12px;
                line-height: 1.2;
                box-shadow: none;
            }
            .icon-button:disabled {
                color: #98a2b3;
                cursor: default;
                opacity: 0.65;
            }
            .webview-frame {
                width: 100%;
                min-height: 760px;
                border: 0;
                background: #fff;
            }
            .docs-frame {
                display: block;
                width: 100%;
                min-height: 760px;
                border: 0;
                background: #ffffff;
            }
            .widget {
                margin: 14px;
                padding: 10px 12px;
                width: 360px;
                height: 176px;
                box-sizing: border-box;
                border: 1px solid #e3e7ef;
                border-radius: 8px;
                background: #fafafa;
                overflow: hidden;
            }
            .widget.small {
                width: 170px;
                height: 170px;
            }
            .widget.large {
                width: 360px;
                height: 360px;
            }
            .widget.accessoryInline {
                width: 257px;
                height: 32px;
                border-radius: 16px;
            }
            .widget.accessoryRectangular {
                width: 172px;
                height: 76px;
                border-radius: 16px;
            }
            .widget.accessoryCircular {
                width: 76px;
                height: 76px;
                border-radius: 50%;
            }
            .widget.accessoryRectangular,
            .widget.accessoryCircular {
                text-align: center;
            }
            .widget.accessoryInline .text {
                display: flex;
                align-items: center;
                justify-content: center;
                flex: 1 1 auto;
                line-height: 1.2;
                text-align: center;
                font-weight: 500;
            }
            .widget.accessoryRectangular .stack,
            .widget.accessoryCircular .stack {
                align-items: center;
                justify-content: center;
            }
            .widget.accessoryRectangular .text,
            .widget.accessoryCircular .text {
                line-height: 1.18;
                text-align: center;
                white-space: normal;
            }
            .widget.accessoryRectangular > .text,
            .widget.accessoryCircular > .text {
                display: -webkit-box;
                -webkit-box-orient: vertical;
            }
            .widget.accessoryRectangular > .text {
                -webkit-line-clamp: 3;
            }
            .widget.accessoryCircular > .text {
                -webkit-line-clamp: 2;
            }
            .widget.accessoryRectangular .image,
            .widget.accessoryCircular .image {
                align-self: center;
            }
            .stack {
                display: flex;
                width: 100%;
                min-width: 0;
            }
            .stack-link {
                color: inherit;
                text-decoration: none;
            }
            .widget > .text,
            .widget > .stack {
                flex: 0 0 auto;
            }
            .status-stack {
                align-items: center;
                line-height: 1;
                min-height: 14px;
            }
            .status-stack .text {
                display: inline-flex;
                align-items: center;
                line-height: 1;
            }
            .status-stack .image {
                align-self: center;
            }
            .stack.column {
                flex-direction: column;
            }
            .text {
                flex: 0 1 auto;
                min-width: 0;
                white-space: nowrap;
                line-height: 1.18;
            }
            .text--line-limit-1 {
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }
            .text--line-limit-multi {
                display: -webkit-box;
                width: 100%;
                max-width: 100%;
                min-width: 0;
                overflow: hidden;
                white-space: normal;
                overflow-wrap: anywhere;
                word-break: break-word;
                -webkit-box-orient: vertical;
            }
            .stack.column > .text--line-limit-multi {
                align-self: stretch;
            }
            .row-stack > .text:not(:last-child) {
                flex: 1 1 auto;
                overflow: hidden;
                text-overflow: ellipsis;
            }
            .row-stack > .text:last-child {
                flex: 0 0 auto;
                margin-left: auto;
                text-align: right;
            }
            .image {
                display: inline-grid;
                flex: 0 0 auto;
                place-items: center;
                width: 18px;
                height: 18px;
                border-radius: 4px;
                color: #667085;
                font-size: 14px;
                line-height: 1;
            }
            .image svg {
                display: block;
                width: 100%;
                height: 100%;
            }
            .image.sf-symbol[data-symbol-src] {
                background: currentColor;
                -webkit-mask: var(--symbol-src) center / contain no-repeat;
                mask: var(--symbol-src) center / contain no-repeat;
            }
            .image.real-image {
                overflow: hidden;
            }
            .image.real-image img {
                display: block;
                width: 100%;
                height: 100%;
                object-fit: cover;
            }
            .image.tinted-image[data-image-src] {
                background: currentColor;
                -webkit-mask: var(--image-src) center / contain no-repeat;
                mask: var(--image-src) center / contain no-repeat;
            }
            pre {
                margin: 0;
                padding: 12px;
                border: 0;
                border-radius: 0;
                background: var(--log-bg);
                color: var(--log-text);
                min-height: 760px;
                max-height: 760px;
                overflow: auto;
                font-size: 12px;
            }
            .log-entry {
                padding: 1px 0 1px 8px;
                border-left: 2px solid transparent;
                white-space: pre-wrap;
            }
            .log-entry + .log-entry {
                margin-top: 4px;
            }
            .log-entry code {
                font-family: ui-monospace, SFMono-Regular, Consolas, 'Liberation Mono', monospace;
                white-space: pre-wrap;
            }
            .log-entry.log-ok {
                border-left-color: var(--ok);
            }
            .log-entry.log-error {
                border-left-color: var(--danger);
            }
            .log-entry.log-warn {
                border-left-color: #f59e0b;
            }
            .hljs {
                color: var(--log-text);
                background: transparent;
            }
            .hljs-attr,
            .hljs-attribute,
            .hljs-property {
                color: var(--syntax-attr);
            }
            .hljs-string,
            .hljs-regexp {
                color: var(--syntax-string);
            }
            .hljs-number,
            .hljs-literal {
                color: var(--syntax-number);
            }
            .hljs-keyword,
            .hljs-built_in,
            .hljs-selector-tag {
                color: var(--syntax-keyword);
            }
            .hljs-comment {
                color: var(--syntax-comment);
            }
            .hljs-title,
            .hljs-function {
                color: var(--syntax-title);
            }
            .hljs-section,
            .hljs-name {
                color: var(--syntax-section);
            }
            .log-ok {
                color: #7ee787;
            }
            .log-error {
                color: #ff8a8a;
            }
            @media (max-width: 1180px) {
                html {
                    height: auto;
                    overflow: auto;
                }
                body {
                    height: auto;
                    overflow: auto;
                }
                main,
                .workspace {
                    grid-template-columns: 1fr;

                main {

                    min-height: calc(100vh - 68px);

                main[data-run-mode='widget'] .workspace,
                main[data-run-mode='app'] .workspace {

                header {

            }
        </style>
    </head>

        <script>
            const AsyncFunction = Object.getPrototypeOf(async function () {}).constructor
            const $ = id => document.getElementById(id)
            const logEl = $('log')
            const previewEl = $('preview')
            const webviewPanelEl = $('webviewPanel')
            const webviewFrameEl = $('webviewFrame')
            const webviewBackEl = $('webviewBack')
            const statusEl = $('status')
            const scriptPillEl = $('scriptPill')
            const themeToggleEl = $('themeToggle')
            const appShellEl = $('appShell')
            const inspectorTitleEl = $('inspectorTitle')
            const logViewEl = $('logView')
            const docsViewEl = $('docsView')
            const showLogEl = $('showLog')
            const showDocsEl = $('showDocs')
            const docsSelectEl = $('docsSelect')
            const docsFrameEl = $('docsFrame')
            const docsOpenEl = $('docsOpen')
            const KEYCHAIN_PATH = '/documents/storage/keychain.json'
            const customSelects = new WeakMap()
            let openCustomSelect = null

            const state = {
                envExports: null,
                logs: [],
                fileCache: new Map(),
                activeWebView: null,
                webviewStack: [],
                keychain: null,
                hasRun: false,
                appearanceRunTimer: null,
                outerThemePreference: 'auto',
            }

            function formatStatus(text) {
                const raw = String(text || '').trim()
                if (!raw) return 'Ready'
                if (/^ready$/i.test(raw)) return 'Ready'
                if (/^error$/i.test(raw)) return 'Error'
                if (/^scripts reloaded$/i.test(raw)) return 'Scripts Reloaded'
                if (/^running\b/i.test(raw)) return 'Running'
                if (/^done\b/i.test(raw)) return 'Done'
                if (/^app runtime active\b/i.test(raw)) return 'App Runtime Active'
                return raw.charAt(0).toUpperCase() + raw.slice(1)
            }

            function statusTone(text) {
                if (/error/i.test(text)) return 'error'
                if (/running|runtime active/i.test(text)) return 'busy'
                return 'ok'
            }

            function setStatus(text) {
                const label = formatStatus(text)
                statusEl.textContent = label
                statusEl.dataset.tone = statusTone(label)
                statusEl.title = label
            }

            function setScriptPill(file = $('script')?.value) {
                const label = file || 'No Script'
                const display = label.replace(/\.js$/i, '')
                scriptPillEl.textContent = display
                scriptPillEl.title = label
            }

            function displayScriptName(file) {
                return String(file || '').replace(/\.js$/i, '')
            }

            function selectedOptionLabel(select) {
                const option = select.options[select.selectedIndex]
                return option?.textContent?.trim() || select.value || ''
            }

            function closeCustomSelect() {
                if (!openCustomSelect) return
                openCustomSelect.wrapper.classList.remove('open')
                openCustomSelect.button.setAttribute('aria-expanded', 'false')
                openCustomSelect.menu.remove()
                openCustomSelect = null
            }

            function positionCustomSelectMenu(entry) {
                const rect = entry.button.getBoundingClientRect()
                const gap = 6
                entry.menu.style.left = `${rect.left}px`
                entry.menu.style.top = `${rect.bottom + gap}px`
                entry.menu.style.width = `${rect.width}px`
                const maxBottom = window.innerHeight - 10
                const menuRect = entry.menu.getBoundingClientRect()
                if (menuRect.bottom > maxBottom) {
                    entry.menu.style.top = `${Math.max(10, rect.top - menuRect.height - gap)}px`
                }
            }

            function syncCustomSelect(select) {
                const entry = customSelects.get(select)
                if (!entry) return
                entry.label.textContent = selectedOptionLabel(select)
            }

            function openCustomSelectMenu(select) {
                const entry = customSelects.get(select)
                if (!entry) return
                if (openCustomSelect === entry) {
                    closeCustomSelect()
                    return
                }
                closeCustomSelect()
                entry.menu.innerHTML = ''
                ;[...select.options].forEach(option => {
                    const item = document.createElement('div')
                    item.className = 'custom-select-option'
                    item.setAttribute('role', 'option')
                    item.setAttribute('aria-selected', String(option.value === select.value))
                    item.dataset.value = option.value
                    item.textContent = option.textContent
                    item.addEventListener('click', () => {
                        select.value = option.value
                        select.dispatchEvent(new Event('change', {bubbles: true}))
                        syncCustomSelect(select)
                        closeCustomSelect()
                    })
                    entry.menu.appendChild(item)
                })
                document.body.appendChild(entry.menu)
                entry.wrapper.classList.add('open')
                entry.button.setAttribute('aria-expanded', 'true')
                openCustomSelect = entry
                positionCustomSelectMenu(entry)
            }

            function enhanceSelect(select) {
                if (!select || customSelects.has(select)) return
                const wrapper = document.createElement('div')
                wrapper.className = 'custom-select'
                const button = document.createElement('button')
                button.className = 'custom-select-button'
                button.type = 'button'
                button.setAttribute('aria-haspopup', 'listbox')
                button.setAttribute('aria-expanded', 'false')
                const label = document.createElement('span')
                label.className = 'custom-select-label'
                const chev = document.createElementNS('http://www.w3.org/2000/svg', 'svg')
                chev.classList.add('custom-select-chev')
                chev.setAttribute('viewBox', '0 0 24 24')
                chev.setAttribute('aria-hidden', 'true')
                const path = document.createElementNS('http://www.w3.org/2000/svg', 'path')
                path.setAttribute('d', 'm6 9 6 6 6-6')
                path.setAttribute('fill', 'none')
                path.setAttribute('stroke', 'currentColor')
                path.setAttribute('stroke-linecap', 'round')
                path.setAttribute('stroke-linejoin', 'round')
                path.setAttribute('stroke-width', '2')
                chev.appendChild(path)
                button.append(label, chev)
                select.parentNode.insertBefore(wrapper, select)
                wrapper.appendChild(select)
                wrapper.appendChild(button)
                select.classList.add('native-select-hidden')
                const menu = document.createElement('div')
                menu.className = 'custom-select-menu'
                menu.setAttribute('role', 'listbox')
                const entry = {select, wrapper, button, label, menu}
                customSelects.set(select, entry)
                button.addEventListener('click', () => openCustomSelectMenu(select))
                button.addEventListener('keydown', event => {
                    if (event.key === 'Enter' || event.key === ' ') {
                        event.preventDefault()
                        openCustomSelectMenu(select)
                    }
                    if (event.key === 'Escape') closeCustomSelect()
                })
                select.addEventListener('change', () => syncCustomSelect(select))
                syncCustomSelect(select)
            }

            function enhanceSelects() {
                ;['script', 'runMode', 'family', 'appearance', 'docsSelect'].forEach(id => enhanceSelect($(id)))
            }

            function getInitialOuterTheme() {
                const saved = localStorage.getItem('playground.theme')
                if (saved === 'dark' || saved === 'light' || saved === 'auto') return saved
                return 'auto'
            }

            function resolveOuterTheme(theme) {
                if (theme === 'light' || theme === 'dark') return theme
                if (!window.matchMedia) return 'dark'
                return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'
            }

            function setOuterTheme(theme, persist = true) {
                const preference = theme === 'light' || theme === 'dark' ? theme : 'auto'
                const next = resolveOuterTheme(preference)
                state.outerThemePreference = preference
                document.documentElement.dataset.theme = next
                document.documentElement.dataset.themePreference = preference
                if (persist) localStorage.setItem('playground.theme', preference)
                themeToggleEl?.setAttribute('aria-label', `Theme: ${preference}`)
                themeToggleEl?.setAttribute('title', `Theme: ${preference}`)
                themeToggleEl.dataset.themeValue = preference
                syncDocsTheme()
            }

            function cycleOuterTheme() {
                const order = ['auto', 'light', 'dark']
                const index = order.indexOf(state.outerThemePreference)
                setOuterTheme(order[(index + 1) % order.length])
            }

            function updateRunModeLayout(runMode = $('runMode').value) {
                appShellEl.dataset.runMode = runMode === 'app' ? 'app' : 'widget'
            }

            function emptyWebViewSrcdoc() {
                const dark = isDarkPreview()
                return `
                    <style>
                        :root { color-scheme: ${dark ? 'dark' : 'light'}; }
                        html, body {
                            margin: 0;
                            min-height: 100%;
                            background: ${dark ? '#000000' : '#f2f2f7'};
                            color: ${dark ? '#8e8e93' : '#667085'};
                            font: 14px/1.45 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                        }
                        body {
                            display: grid;
                            place-items: center;
                        }
                    </style>
                    <body></body>
                `
            }

            function syncRunModeSurface(runMode = $('runMode').value) {
                updateRunModeLayout(runMode)
                const isApp = runMode === 'app'
                webviewPanelEl.hidden = !isApp
                if (isApp && !state.activeWebView && !webviewFrameEl.getAttribute('srcdoc')) {
                    webviewFrameEl.srcdoc = emptyWebViewSrcdoc()
                }
                if (!isApp) {
                    webviewFrameEl.removeAttribute('srcdoc')
                }
                $('surfaceTitle').textContent = isApp ? 'Widget Preview / App Action Preview' : 'Widget Preview'
                updateWebViewBackButton()
            }

            function writeLog(type, value) {
                setInspectorView('log')
                const text = typeof value === 'string' ? value : JSON.stringify(value, null, 2)
                state.logs.push({type, text})
                logEl.innerHTML = state.logs.map(renderLogEntry).join('')
                logEl.scrollTop = logEl.scrollHeight
            }

            function getLogLanguage(text) {
                const trimmed = text.trim()
                if (!trimmed) return 'plaintext'
                if (
                    (trimmed.startsWith('{') && trimmed.endsWith('}')) ||
                    (trimmed.startsWith('[') && trimmed.endsWith(']'))
                ) {
                    try {
                        JSON.parse(trimmed)
                        return 'json'
                    } catch {
                        return 'javascript'
                    }
                }
                if (/^(async\s+)?function\b|=>|const\s+|let\s+|var\s+|class\s+/.test(trimmed)) return 'javascript'
                if (/^https?:\/\//.test(trimmed)) return 'http'
                return 'plaintext'
            }

            function highlightText(text, language) {
                if (!window.hljs || language === 'plaintext') return escapeHtml(text)
                try {
                    return window.hljs.highlight(text, {language, ignoreIllegals: true}).value
                } catch {
                    return escapeHtml(text)
                }
            }

            function renderLogEntry(item) {
                const language = getLogLanguage(item.text)
                const tone =
                    item.type === 'error'
                        ? ' log-error'
                        : item.type === 'ok'
                          ? ' log-ok'
                          : item.type === 'warn'
                            ? ' log-warn'
                            : ''
                return `<div class="log-entry${tone}"><code class="hljs language-${language}">${highlightText(item.text, language)}</code></div>`
            }

            function setInspectorView(view) {
                const isDocs = view === 'docs'
                inspectorTitleEl.textContent = isDocs ? 'Scriptable Docs' : 'Log / Requests'
                logViewEl.hidden = isDocs
                docsViewEl.hidden = !isDocs
                showLogEl.classList.toggle('active', !isDocs)
                showDocsEl.classList.toggle('active', isDocs)
            }

            function applyPreviewDefaults() {
                previewEl.style.background = isDarkPreview() ? '#000000' : '#fafafa'
                previewEl.style.borderColor = isDarkPreview() ? '#263856' : '#e3e7ef'
            }

            function resetSurfaces(runMode) {
                updateRunModeLayout(runMode)
                while (state.webviewStack.length) {
                    state.webviewStack.pop().webView?.close?.()
                }
                state.activeWebView = null
                previewEl.innerHTML = ''
                previewEl.removeAttribute('style')
                previewEl.classList.remove('small', 'large', 'accessoryInline', 'accessoryRectangular', 'accessoryCircular')
                applyPreviewDefaults()
                webviewFrameEl.removeAttribute('srcdoc')
                syncRunModeSurface(runMode)
            }

            function updateWebViewBackButton() {
                webviewBackEl.disabled = state.webviewStack.length <= 1
            }

            function showWebViewEntry(entry) {
                state.activeWebView = entry?.webView || null
                const value = String(entry?.content || '')
                webviewPanelEl.hidden = false
                entry?.webView?.attachFrame?.(webviewFrameEl)
                if (/^https?:\/\//.test(value)) {
                    webviewFrameEl.srcdoc = `<p style="font:14px system-ui;padding:16px">WebView URL: <a href="${escapeHtml(value)}" target="_blank">${escapeHtml(value)}</a></p>`
                } else {
                    webviewFrameEl.srcdoc =
                        forceWebViewAppearance(value) ||
                        '<p style="font:14px system-ui;padding:16px;color:#667085">Empty WebView</p>'
                }
                updateWebViewBackButton()
                return webviewFrameEl
            }

            function forceWebViewAppearance(html) {
                const value = String(html || '').replace(
                    /<style id="playground-appearance-override">[\s\S]*?<\/style>/g,
                    '',
                )
                if (!value) return ''
                const appearance = $('appearance').value
                const darkCss = `
                    :root {
                        color-scheme: dark !important;
                        --color-text: #f5f5f7 !important;
                        --color-muted: #8e8e93 !important;

            function renderWebView(content, webView) {
                const entry = {content, webView}
                state.webviewStack.push(entry)
                return showWebViewEntry(entry)
            }

            function presentAlert(options = {}) {
                const title = options.title || 'Alert'
                const message = options.message || ''
                const actions = Array.isArray(options.actions) ? options.actions : []
                const textFields = Array.isArray(options.textFields) ? options.textFields : []
                const cancelAction = options.cancelAction

                writeLog('log', `[Alert] ${title}`)

                return new Promise(resolve => {
                    const host = webviewPanelEl && !webviewPanelEl.hidden ? webviewPanelEl : document.body
                    const overlay = document.createElement('div')
                    overlay.style.cssText = [
                        host === document.body ? 'position:fixed' : 'position:absolute',
                        host === document.body ? 'inset:0' : 'inset:42px 0 0 0',
                        'z-index:9999',
                        'display:flex',
                        'align-items:center',
                        'justify-content:center',
                        'padding:20px',
                        'background:rgba(0,0,0,0.35)',
                    ].join(';')

                    const panel = document.createElement('div')
                    panel.style.cssText = [
                        'width:min(420px, calc(100% - 40px))',
                        'box-sizing:border-box',
                        'border-radius:12px',
                        'background:var(--panel)',
                        'border:1px solid var(--border)',
                        'box-shadow:0 20px 60px rgba(0,0,0,0.35)',
                        'padding:18px',
                    ].join(';')

                    const titleEl = document.createElement('div')
                    titleEl.textContent = title
                    titleEl.style.cssText = 'font-size:18px;font-weight:700;margin-bottom:8px;color:var(--text)'
                    panel.appendChild(titleEl)

                    if (message) {
                        const messageEl = document.createElement('div')
                        messageEl.textContent = message
                        messageEl.style.cssText = 'font-size:13px;color:var(--muted);margin-bottom:14px;white-space:pre-wrap'
                        panel.appendChild(messageEl)
                    }

                    const inputs = textFields.map(field => {
                        const input = document.createElement('input')
                        input.type = field.secure ? 'password' : 'text'
                        input.placeholder = field.placeholder || ''
                        input.value = field.value || ''
                        input.style.cssText = [
                            'width:100%',
                            'box-sizing:border-box',
                            'margin:0 0 10px',
                            'padding:10px 11px',
                            'border-radius:8px',
                            'border:1px solid var(--border)',
                            'background:var(--input)',
                            'color:var(--text)',
                            'font:inherit',
                        ].join(';')
                        panel.appendChild(input)
                        return input
                    })

                    const buttonRow = document.createElement('div')
                    buttonRow.style.cssText = 'display:flex;gap:8px;justify-content:flex-end;margin-top:6px;flex-wrap:wrap'

                    const finish = index => {
                        overlay.remove()
                        resolve({index, textFields: inputs.map(input => input.value)})
                    }

                    if (cancelAction) {
                        const cancel = document.createElement('button')
                        cancel.type = 'button'
                        cancel.textContent = cancelAction
                        cancel.className = 'secondary'
                        cancel.addEventListener('click', () => finish(-1))
                        buttonRow.appendChild(cancel)
                    }

                    actions.forEach((action, index) => {
                        const button = document.createElement('button')
                        button.type = 'button'
                        button.textContent = action.title || `Action ${index + 1}`
                        if (action.destructive) button.style.background = '#e5484d'
                        button.addEventListener('click', () => finish(index))
                        buttonRow.appendChild(button)
                    })

                    if (!actions.length && !cancelAction) {
                        const ok = document.createElement('button')
                        ok.type = 'button'
                        ok.textContent = 'OK'
                        ok.addEventListener('click', () => finish(0))
                        buttonRow.appendChild(ok)
                    }

                    panel.appendChild(buttonRow)
                    overlay.appendChild(panel)
                    host.appendChild(overlay)
                    inputs[0]?.focus()
                })
            }

                if (state.webviewStack.length <= 1) return
                const current = state.webviewStack.pop()

                showWebViewEntry(state.webviewStack[state.webviewStack.length - 1])

            function readKeychainStore() {
                if (state.keychain) return state.keychain
                try {
                    const text = apiJsonSync('GET', `/api/fs/read-string?path=${encodeURIComponent(KEYCHAIN_PATH)}`)
                        .data
                    state.keychain = text ? normalizeKeychainStore(JSON.parse(text)) : {}
                    if (text) {
                        apiJsonSync('POST', '/api/fs/write-string', {
                            path: KEYCHAIN_PATH,
                            value: JSON.stringify(state.keychain, null, 2),
                        })
                    }
                } catch (error) {
                    writeLog('warn', `[Keychain] failed to read ${KEYCHAIN_PATH}: ${error.message}`)
                    state.keychain = {}
                }
                mirrorKeychainDebug()
                return state.keychain
            }

            function normalizeKeychainStore(store) {
                const normalized = {}
                Object.keys(store || {}).forEach(key => {
                    normalized[key] = parseKeychainValue(store[key])
                })
                return normalized
            }

            function parseKeychainValue(value) {
                if (typeof value !== 'string') return value
                const trimmed = value.trim()
                if (!trimmed || !/^[\[{]/.test(trimmed)) return value
                try {
                    return JSON.parse(trimmed)
                } catch (error) {
                    return value
                }
            }

            function serializeKeychainValue(value) {
                return typeof value === 'string' ? value : JSON.stringify(value)
            }

            function writeKeychainStore() {
                const value = JSON.stringify(readKeychainStore(), null, 2)
                apiJsonSync('POST', '/api/fs/write-string', {path: KEYCHAIN_PATH, value})
                mirrorKeychainDebug()
            }

            function mirrorKeychainDebug() {
                let el = document.getElementById('keychain-debug')
                if (!el) {
                    el = document.createElement('pre')
                    el.id = 'keychain-debug'
                    el.hidden = true
                    document.body.appendChild(el)
                }
                el.textContent = JSON.stringify(readKeychainStore())
            }

                            (s.charCodeAt(i + 1) << 8) +
                            (s.charCodeAt(i + 2) << 16) +

            function warnDuplicateScriptNames(scripts) {
                const names = new Map()
                for (const file of scripts) {
                    const name = file.replace(/\.js$/, '')
                    const existing = names.get(name)
                    if (existing) {
                        writeLog('warn', `[Keychain] script name conflict: "${name}" is shared by ${existing} and ${file}`)

            function escapeHtml(value) {
                return String(value).replace(

            function safeJson(value) {
                try {

                    throw new Error(`Mock JSON parse failed: ${error.message}`)

            function apiJsonSync(method, url, body) {
                const xhr = new XMLHttpRequest()
                xhr.open(method, url, false)
                xhr.setRequestHeader('content-type', 'application/json')
                xhr.send(body === undefined ? null : JSON.stringify(body))
                if (xhr.status < 200 || xhr.status >= 300) {
                    throw new Error(`Playground API failed ${xhr.status}: ${url}`)
                }
                return JSON.parse(xhr.responseText)
            }

            function chooseBrowserFile(accept = '*/*') {
                return new Promise(resolve => {
                    const input = document.createElement('input')
                    input.type = 'file'
                    input.accept = accept
                    input.style.position = 'fixed'
                    input.style.left = '-9999px'
                    input.style.top = '0'
                    document.body.appendChild(input)
                    input.addEventListener(
                        'change',
                        () => {
                            const file = input.files?.[0] || null
                            input.remove()
                            resolve(file)
                        },
                        {once: true},
                    )
                    input.addEventListener(
                        'cancel',
                        () => {
                            input.remove()
                            resolve(null)
                        },
                        {once: true},
                    )
                    input.click()
                })
            }

            async function pickImageFromBrowser() {
                const file = await chooseBrowserFile('image/*')
                if (!file) return null
                const dataUrl = await new Promise((resolve, reject) => {
                    const reader = new FileReader()
                    reader.onload = () => resolve(String(reader.result || ''))
                    reader.onerror = () => reject(reader.error || new Error('Failed to read image file'))
                    reader.readAsDataURL(file)
                })
                return MockImage.fromSrc(file.name || 'picked-image', 'picked-image', dataUrl)
            }

            function createFallbackSymbolPngDataUrl(name = 'symbol') {
                const canvas = document.createElement('canvas')
                canvas.width = 64
                canvas.height = 64
                const ctx = canvas.getContext('2d')
                ctx.clearRect(0, 0, 64, 64)
                ctx.strokeStyle = '#000000'
                ctx.fillStyle = '#000000'
                ctx.lineWidth = 4
                ctx.lineJoin = 'round'
                ctx.strokeRect(16, 16, 32, 32)
                ctx.font = 'bold 10px system-ui'
                ctx.textAlign = 'center'
                ctx.textBaseline = 'middle'
                ctx.fillText(String(name).split('.').slice(0, 2).join('.').slice(0, 8), 32, 32)
                return canvas.toDataURL('image/png')
            }

            function createSfSymbolPngDataUrl(name = 'square.grid.2x2') {
                try {
                    const result = apiJsonSync('GET', `/api/sf-symbol.json?name=${encodeURIComponent(name)}`)
                    const symbol = result.data
                    const [minX, minY, width, height] = String(symbol.viewBox || '0 0 64 64')
                        .split(/\s+/)
                        .map(Number)
                    if (!symbol.paths?.length || !width || !height) return createFallbackSymbolPngDataUrl(name)

                    const canvas = document.createElement('canvas')
                    canvas.width = 64
                    canvas.height = 64
                    const ctx = canvas.getContext('2d')
                    ctx.clearRect(0, 0, 64, 64)
                    const scale = Math.min(52 / width, 52 / height)
                    const offsetX = (64 - width * scale) / 2
                    const offsetY = (64 - height * scale) / 2

                    ctx.save()
                    ctx.translate(offsetX, offsetY)
                    ctx.scale(scale, scale)
                    ctx.translate(-minX, -minY)
                    ctx.fillStyle = '#000000'
                    for (const pathInfo of symbol.paths) {
                        const path = new Path2D(pathInfo.d)
                        ctx.globalAlpha = Number(pathInfo.fillOpacity ?? 1)
                        ctx.fill(path, pathInfo.fillRule === 'evenodd' ? 'evenodd' : 'nonzero')
                    }
                    ctx.restore()
                    ctx.globalAlpha = 1

                    return canvas.toDataURL('image/png')
                } catch {
                    return createFallbackSymbolPngDataUrl(name)
                }
            }
